<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa bulunamadı – Argos</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>html { scroll-behavior: smooth; }</style>
</head>
<body>
  <div class="stars" aria-hidden="true" id="stars"></div>

  <header class="header header--simple">
    <div class="header__inner">
      <a href="index.html" class="header__brand">
        <span class="header__logo-frame">
          <img class="header__logo-img" src="./assets/logo.png.jpeg" alt="Argos" width="56" height="56" decoding="async" onerror="this.parentElement.style.display='none';" />
        </span>
        <span class="header__logo-text">ARGOS</span>
      </a>
      <nav class="header__nav">
        <a href="index.html">Ana sayfa</a>
        <a href="index.html#iletisim" class="header__cta">İletişim</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="error-page">
      <p class="error-page__code" aria-hidden="true">404</p>
      <h1 class="error-page__title">Sayfa bulunamadı</h1>
      <p class="error-page__text">Aradığınız sayfa mevcut değil veya taşınmış olabilir.</p>
      <a href="index.html" class="hero__cta">Ana sayfaya dön</a>
    </section>
  </main>

  <script defer>
    document.addEventListener('DOMContentLoaded', function() {
      var container = document.getElementById('stars');
      if (!container) return;
      for (var i = 0; i < 25; i++) {
        var s = document.createElement('span');
        s.className = 'star star--' + (Math.random() > 0.5 ? 's' : 'm');
        s.style.left = (Math.random() * 100).toFixed(2) + '%';
        s.style.top = (Math.random() * 100).toFixed(2) + '%';
        s.style.animationDelay = (Math.random() * 4).toFixed(2) + 's';
        s.style.animationDuration = (2 + Math.random() * 2).toFixed(2) + 's';
        s.style.setProperty('--star-r', (Math.random() * 360) + 'deg');
        container.appendChild(s);
      }
    });
  </script>
</body>
</html>
